name: Build & Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: tatva-school-app
  REGION: us-central1
  SERVICE_NAME: tatva-api
  STORAGE_BUCKET: tatva-school-app.firebasestorage.app
  CORS_ORIGINS: "https://tatva-school-app.web.app,https://tatva-school-app.firebaseapp.com"
  BACKEND_URL: "https://tatva-api-859841471446.us-central1.run.app"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ─── Server (Express → Cloud Run) ───────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install and build server
        run: npm ci && npm run build
        working-directory: server

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe docker-repo \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create docker-repo \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Build and push Docker image
        working-directory: server
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/docker-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/docker-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=$IMAGE \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars='^##^NODE_ENV=production##STORAGE_BUCKET=${{ env.STORAGE_BUCKET }}##CORS_ORIGINS=${{ env.CORS_ORIGINS }}'

      # ─── Flutter Web Build ───────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - run: flutter pub get

      - run: flutter build web --release --dart-define=BACKEND_URL=${{ env.BACKEND_URL }}

      # ─── Deploy Hosting + Firestore + Storage rules ─────────────────
      - name: Deploy to Firebase (Hosting + Firestore + Storage)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,firestore,storage --project ${{ env.PROJECT_ID }} --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
